<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Milk Dreams</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bungee&family=DM+Mono:ital,wght@0,400;0,500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/client/ui/styles.css" />
  </head>
  <body>
    <div id="app">
      <div id="loading-screen" aria-live="polite">Loading…</div>
      <div id="name-modal" class="name-modal hidden" aria-hidden="true" role="dialog" aria-labelledby="name-modal-title">
        <div class="name-modal__panel">
          <h2 id="name-modal-title" class="name-modal__title">What's your name?</h2>
          <form id="name-modal-form" class="name-modal__form" autocomplete="off">
            <input
              id="name-modal-input"
              class="name-modal__input"
              type="text"
              minlength="3"
              maxlength="18"
              placeholder="e.g. Marta"
              spellcheck="false"
              autocapitalize="off"
              autocorrect="off"
              required
            />
            <button class="name-modal__primary" type="submit" disabled>Start</button>
          </form>
          <p id="name-modal-error" class="name-modal__error" aria-live="polite"></p>
        </div>
      </div>
      <canvas id="game"></canvas>
      <div id="level-editor-root" class="level-editor-root hidden" aria-hidden="true"></div>
      <div id="hud">
        <div id="hud-left-column">
          <div class="hud-left-card">
            <div class="hud-name-plate">
              <div id="net-badge" class="net-badge net-badge--idle" aria-live="polite">
                <span class="net-badge__dot" aria-hidden="true"></span>
                <span class="net-badge__text">Local</span>
              </div>
            </div>
            <div id="hud-time-block" aria-label="Time remaining">
              <div id="hud-round" class="hud-round">Round 1</div>
              <div id="timer-value" class="hud-value">3:00</div>
            </div>
            <div id="hud-milk-block">
              <div class="hud-milk-stack" role="group" aria-label="Milk">
                <div class="hud-milk-row hud-milk-row--carry">
                  <div class="hud-milk-row__meta">
                    <span class="hud-label">Carrying</span>
                    <div class="hud-milk-amount">
                      <img
                        class="hud-milk-icon"
                        src="/assets/milk-jug.svg"
                        width="24"
                        height="24"
                        alt=""
                        decoding="async"
                      />
                      <span id="litres-carrying" class="hud-value hud-value--milk">1L</span>
                    </div>
                  </div>
                </div>
                <div class="hud-milk-row hud-milk-row--done">
                  <div class="hud-milk-row__meta">
                    <span class="hud-label hud-label--muted">Delivered</span>
                    <div class="hud-milk-amount">
                      <img
                        class="hud-milk-icon hud-milk-icon--muted"
                        src="/assets/milk-jug.svg"
                        width="24"
                        height="24"
                        alt=""
                        decoding="async"
                      />
                      <span id="litres-delivered" class="hud-value hud-value--milk hud-value--milk-delivered">0L</span>
                    </div>
                  </div>
                </div>
              </div>
            </div>
            <p id="debug-playtest-hint" class="hud-playtest-hint hidden" aria-hidden="true">
              INVINCIBLE
            </p>
          </div>
        </div>

        <div id="hud-balance-center">
          <div class="hud-balance-chrome">
            <div id="balance-bar-track">
              <div id="spill-bar"></div>
            </div>
            <div id="balance-bar-footer">
              <span id="balance-label">Balance</span>
              <span id="spill-value">0%</span>
            </div>
          </div>
        </div>

        <div id="hud-right-stack">
          <div id="minimap-wrap" title="Radar · distance to goal">
            <canvas id="minimap"></canvas>
            <div id="minimap-distance" class="minimap-distance-overlay" aria-label="Distance to goal">
              <span class="distance-num">—</span><span class="distance-unit">m</span>
            </div>
          </div>
          <div id="hud-dream-wrap" role="img" aria-label="">
            <canvas id="dream-preview-canvas" width="120" height="120"></canvas>
          </div>
        </div>

        <div id="toast"></div>
        <div id="hud-center">
          <div id="message"></div>
          <div id="hint">W/S move — A/D turn — Arrows balance the jug — Hold left mouse to look around — R restart</div>
        </div>

        <div id="scoreboard" class="scoreboard hidden" aria-hidden="true">
          <div class="scoreboard__panel">
            <div class="scoreboard__title">Round over</div>
            <div class="scoreboard__subtitle">
              Next in <span id="scoreboard-countdown">10</span>s
            </div>
            <ol id="scoreboard-list" class="scoreboard__list"></ol>

            <div id="leaderboard-section" class="scoreboard__section">
              <div class="scoreboard__section-title">All-time Top 10</div>
              <ol id="leaderboard-list" class="scoreboard__list scoreboard__list--alltime">
                <li class="scoreboard__placeholder">Loading…</li>
              </ol>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/client/main.ts"></script>
  </body>
</html>
