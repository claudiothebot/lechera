<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>🥛 La Lechera · Prototipo</title>
  <meta name="description" content="Prototipo jugable de La Lechera para la Vibe Coding Game Jam 2026.">
  <meta property="og:title" content="🥛 La Lechera · Prototipo">
  <meta property="og:description" content="Equilibra el cántaro por las calles del mercado y resiste la codicia.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://lechera.anto.codes/play/">
  <meta property="og:image" content="https://lechera.anto.codes/assets/milk-dreams-cover.jpg">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🥛</text></svg>">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
    :root { --safe-top: env(safe-area-inset-top, 0px); --safe-bottom: env(safe-area-inset-bottom, 0px); }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #d4c4a8; font-family: 'Fraunces', serif; touch-action: none; }
    #game { position: absolute; inset: 0; }
    .ui { position: absolute; pointer-events: none; z-index: 10; }
    .top-nav { top: calc(12px + var(--safe-top)); left: 50%; transform: translateX(-50%); }
    .top-nav a { pointer-events: auto; text-decoration: none; }
    .hud { top: calc(12px + var(--safe-top)); left: 14px; right: 14px; display: flex; justify-content: space-between; }
    .pill { background: rgba(42,31,21,0.85); color: #fffcf5; padding: 10px 16px; border-radius: 20px; font-size: 14px; backdrop-filter: blur(8px); }
    .pill span { font-size: 20px; font-weight: 600; }
    .balance-bar { position: absolute; top: calc(60px + var(--safe-top)); left: 50%; transform: translateX(-50%); width: 140px; height: 8px; background: rgba(42,31,21,0.2); border-radius: 4px; overflow: hidden; }
    .balance-fill { position: absolute; top: 0; left: 50%; width: 6px; height: 100%; background: #c45c3e; border-radius: 3px; transform: translateX(-50%); transition: transform 0.05s linear; }
    .danger-zone { position: absolute; top: 0; width: 25%; height: 100%; background: rgba(196,92,62,0.3); }
    .danger-zone.left { left: 0; border-radius: 4px 0 0 4px; }
    .danger-zone.right { right: 0; border-radius: 0 4px 4px 0; }
    .overlay { position: absolute; inset: 0; display: grid; place-items: center; background: rgba(232,221,208,0.92); backdrop-filter: blur(12px); z-index: 20; transition: opacity 0.3s; }
    .overlay.hidden { opacity: 0; pointer-events: none; }
    .card { width: min(380px, 90%); background: #fffcf5; padding: 40px 32px; border-radius: 28px; text-align: center; color: #2a1f15; box-shadow: 0 40px 100px rgba(0,0,0,0.25); }
    .card h1 { font-size: 42px; margin-bottom: 12px; }
    .card p { font-size: 16px; opacity: 0.7; font-style: italic; margin-bottom: 24px; }
    .controls { background: rgba(42,31,21,0.06); padding: 20px; border-radius: 16px; margin-bottom: 24px; font-size: 14px; line-height: 1.6; }
    .controls strong { display: block; margin-bottom: 8px; font-weight: 600; }
    button { pointer-events: auto; border: none; background: #2a1f15; color: #fffcf5; font-family: inherit; font-size: 18px; font-weight: 600; padding: 16px 40px; border-radius: 999px; cursor: pointer; box-shadow: 0 8px 24px rgba(42,31,21,0.3); transition: transform 0.15s; }
    button:active { transform: scale(0.96); }
    .toast { position: absolute; bottom: calc(100px + var(--safe-bottom)); left: 50%; transform: translateX(-50%) translateY(20px); background: #fcd97a; color: #2a1f15; padding: 12px 24px; border-radius: 24px; font-weight: 600; opacity: 0; transition: all 0.3s; pointer-events: none; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .tutorial { position: absolute; bottom: calc(80px + var(--safe-bottom)); left: 50%; transform: translateX(-50%); background: rgba(42,31,21,0.7); color: #fffcf5; padding: 10px 20px; border-radius: 20px; font-size: 13px; opacity: 0; transition: opacity 0.5s; }
    .tutorial.show { opacity: 1; }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  
  <div class="ui top-nav">
    <a class="pill" href="/">← Volver a Milk Dreams</a>
  </div>

  <div class="ui hud">
    <div class="pill"><span id="score">0</span> ✦</div>
    <div class="pill"><span id="dist">0</span> m</div>
  </div>
  
  <div class="ui balance-bar">
    <div class="danger-zone left"></div>
    <div class="danger-zone right"></div>
    <div class="balance-fill" id="bal"></div>
  </div>
  
  <div class="ui toast" id="toast"></div>
  <div class="ui tutorial" id="tut">← → Mantén el equilibrio</div>
  
  <div class="overlay" id="start">
    <div class="card">
      <h1>🥛</h1>
      <p>Equilibra el cántaro por las calles del mercado.<br>Resiste la codicia.</p>
      <div class="controls">
        <strong>Controles</strong>
        PC: Flechas ← → o A D<br>
        Móvil: Inclina el dispositivo
      </div>
      <button onclick="startGame()">Jugar</button>
    </div>
  </div>
  
  <div class="overlay hidden" id="over">
    <div class="card">
      <h1 id="endIcon">💦</h1>
      <p id="endText">¡Se derramó la leche!</p>
      <div class="controls">
        <span id="endScore">0m · 0✦</span>
      </div>
      <button onclick="startGame()">Otra vez</button>
    </div>
  </div>

<script>
const c = document.getElementById('game');
const x = c.getContext('2d');
let W, H, D;

function resize() {
  D = Math.min(devicePixelRatio || 1, 2);
  W = innerWidth; 
  H = innerHeight;
  c.width = W * D; 
  c.height = H * D;
  c.style.width = W + 'px';
  c.style.height = H + 'px';
  x.setTransform(D, 0, 0, D, 0, 0);
}
addEventListener('resize', resize);
resize();

// Game state
const S = {
  phase: 'menu',
  x: 0, y: 0,
  balance: 0,
  balanceVel: 0,
  score: 0,
  distance: 0,
  greed: 0,
  speed: 70,
  camY: 0
};

const World = {
  buildings: [],
  streetItems: [],
  pickups: [],
  particles: [],
  nextPickup: -100,
  nextDecor: -50
};

const Input = { left: false, right: false, tilt: 0 };

// Controls
addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') Input.left = true;
  if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') Input.right = true;
});

addEventListener('keyup', e => {
  if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') Input.left = false;
  if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') Input.right = false;
});

// Gyroscope
if (window.DeviceOrientationEvent) {
  window.addEventListener('deviceorientation', e => {
    const g = e.gamma || 0;
    Input.tilt = Math.max(-1, Math.min(1, g / 30));
  }, { passive: true });
}

// Touch controls
let touchStartX = null;
addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
addEventListener('touchmove', e => {
  if (touchStartX === null) return;
  const dx = e.touches[0].clientX - touchStartX;
  Input.tilt = Math.max(-1, Math.min(1, dx / 100));
}, { passive: true });
addEventListener('touchend', () => { touchStartX = null; Input.tilt = 0; });

// City generation
const buildingColors = ['#c4a77d', '#d4b896', '#b8956a', '#a68b6c', '#d9c4a8', '#c9b896'];
const roofColors = ['#a05040', '#8a7050', '#a06045', '#8b5040'];

function generateBuilding(y) {
  const side = Math.random() > 0.5 ? 1 : -1;
  const dist = 120 + Math.random() * 100;
  const width = 35 + Math.random() * 30;
  const height = 50 + Math.random() * 60;
  
  World.buildings.push({
    x: side * dist,
    y: y,
    w: width,
    h: height,
    color: buildingColors[Math.floor(Math.random() * buildingColors.length)],
    roof: Math.random() > 0.3 ? 'tile' : 'flat',
    roofColor: roofColors[Math.floor(Math.random() * roofColors.length)],
    type: Math.random() > 0.6 ? 'shop' : 'house',
    detail: Math.random()
  });
}

function generateStreetItem(y) {
  const type = Math.random() > 0.7 ? 'stall' : (Math.random() > 0.5 ? 'barrel' : 'crate');
  const side = Math.random() > 0.5 ? 1 : -1;
  const x = side * (40 + Math.random() * 50);
  World.streetItems.push({ x, y, type });
}

function spawnPickup(y) {
  const side = Math.random() > 0.5 ? 1 : -1;
  const dist = 25 + Math.random() * 45;
  World.pickups.push({
    x: side * dist,
    y: y,
    collected: false,
    value: 5 + Math.floor(Math.random() * 10),
    pulse: Math.random() * Math.PI * 2
  });
}

function emitParticles(px, py, color, count) {
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 * i) / count + Math.random() * 0.5;
    World.particles.push({
      x: px, y: py,
      vx: Math.cos(angle) * 40,
      vy: Math.sin(angle) * 40,
      life: 0.5 + Math.random() * 0.3,
      color: color,
      size: 2 + Math.random() * 3
    });
  }
}

function showToast(text) {
  const t = document.getElementById('toast');
  t.textContent = text;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1200);
}

function startGame() {
  S.phase = 'play';
  S.x = 0; S.y = 0;
  S.balance = 0; S.balanceVel = 0;
  S.score = 0; S.distance = 0; S.greed = 0;
  S.camY = 0;
  
  World.buildings = [];
  World.streetItems = [];
  World.pickups = [];
  World.particles = [];
  World.nextPickup = -80;
  World.nextDecor = -40;
  
  // Generate initial city
  for (let y = 0; y > -2000; y -= 80) {
    generateBuilding(y);
    if (Math.random() < 0.3) generateStreetItem(y);
  }
  
  document.getElementById('start').classList.add('hidden');
  document.getElementById('over').classList.add('hidden');
  
  // Show tutorial briefly
  const tut = document.getElementById('tut');
  tut.classList.add('show');
  setTimeout(() => tut.classList.remove('show'), 4000);
}

function gameOver(reason) {
  S.phase = 'over';
  document.getElementById('over').classList.remove('hidden');
  document.getElementById('endIcon').textContent = reason === 'fall' ? '💦' : '😵';
  document.getElementById('endText').textContent = reason === 'fall' 
    ? '¡Se derramó toda la leche!' 
    : '¡Te caíste del camino!';
  document.getElementById('endScore').textContent = `${Math.floor(S.distance)}m · ${S.score}✦`;
}

// Game loop
function update(dt) {
  if (S.phase !== 'play') return;
  
  // Input
  let lean = 0;
  if (Input.left) lean = -1;
  if (Input.right) lean = 1;
  if (Math.abs(Input.tilt) > 0.1) lean = Input.tilt;
  
  // Balance physics
  const instability = 0.2 + S.greed * 0.8;
  const restoreForce = -S.balance * 0.6;
  const inputForce = lean * 2.2;
  const noise = (Math.sin(Date.now() * 0.003) + Math.sin(Date.now() * 0.007)) * 0.03 * instability;
  
  S.balanceVel += (restoreForce + inputForce + noise) * dt * 60;
  S.balanceVel *= 0.9; // Damping
  S.balance += S.balanceVel * dt;
  
  // Check death by falling
  if (Math.abs(S.balance) > 1) {
    gameOver('fall');
    return;
  }
  
  // Move forward
  S.y -= S.speed * (1 + S.greed * 0.15) * dt;
  S.distance = Math.max(0, -S.y / 10);
  
  // Side movement from balance
  S.x += S.balance * 20 * dt;
  
  // Check death by leaving path
  if (Math.abs(S.x) > 75) {
    gameOver('path');
    return;
  }
  
  // Generate more city
  if (S.y < World.nextDecor - 200) {
    generateBuilding(S.y - 200);
    World.nextDecor = S.y;
    if (Math.random() < 0.4) generateStreetItem(S.y - 50);
  }
  
  // Generate pickups
  if (S.y < World.nextPickup) {
    spawnPickup(S.y - 60 - Math.random() * 80);
    World.nextPickup = S.y - 60 - Math.random() * 100;
  }
  
  // Update pickups
  World.pickups = World.pickups.filter(p => {
    const dx = p.x - S.x;
    const dy = p.y - S.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    
    if (!p.collected && dist < 22) {
      p.collected = true;
      S.score += p.value;
      S.greed = Math.min(0.9, S.greed + 0.06);
      emitParticles(p.x, p.y, '#fcd97a', 8);
      showToast('+' + p.value);
      return false;
    }
    return p.y > S.y + H + 100;
  });
  
  // Clean up old buildings
  World.buildings = World.buildings.filter(b => b.y > S.y - H - 200);
  World.streetItems = World.streetItems.filter(s => s.y > S.y - H - 100);
  
  // Update particles
  World.particles.forEach(p => {
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.life -= dt;
  });
  World.particles = World.particles.filter(p => p.life > 0);
  
  // Greed decay
  S.greed = Math.max(0, S.greed - dt * 0.015);
  
  // Camera follows player
  S.camY = S.y - H * 0.55;
}

function draw() {
  // Background - warm mediterranean sky
  const gradient = x.createLinearGradient(0, 0, 0, H);
  gradient.addColorStop(0, '#87CEEB');
  gradient.addColorStop(1, '#E8DDD0');
  x.fillStyle = gradient;
  x.fillRect(0, 0, W, H);
  
  x.save();
  x.translate(W / 2, H / 2 - S.camY);
  
  // Ground/Street
  x.fillStyle = '#c9b8a0';
  x.fillRect(-150, S.y - H, 300, H * 2);
  
  // Cobblestone pattern
  for (let sy = S.y - H - 50; sy < S.y + H + 50; sy += 25) {
    for (let sx = -140; sx < 140; sx += 25) {
      const offset = ((Math.floor(sy / 25) % 2) * 12);
      const cx = sx + offset;
      x.fillStyle = ((Math.floor(sy / 25) + Math.floor(sx / 25)) % 2 === 0) ? '#d4c3aa' : '#cbbba2';
      x.fillRect(cx - 10, sy - 10, 20, 20);
    }
  }
  
  // Street borders
  x.strokeStyle = '#a89070';
  x.lineWidth = 3;
  x.beginPath();
  x.moveTo(-75, S.y - H);
  x.lineTo(-75, S.y + H);
  x.stroke();
  x.beginPath();
  x.moveTo(75, S.y - H);
  x.lineTo(75, S.y + H);
  x.stroke();
  
  // Buildings
  World.buildings.forEach(b => {
    if (b.y < S.camY - H || b.y > S.camY + H) return;
    
    // Shadow
    x.fillStyle = 'rgba(0,0,0,0.15)';
    x.fillRect(b.x - b.w/2 + 4, b.y + 4, b.w, b.h);
    
    // Building body
    x.fillStyle = b.color;
    x.fillRect(b.x - b.w/2, b.y, b.w, b.h);
    
    // Roof
    x.fillStyle = b.roofColor;
    if (b.roof === 'tile') {
      x.beginPath();
      x.moveTo(b.x - b.w/2 - 4, b.y);
      x.lineTo(b.x, b.y - 15);
      x.lineTo(b.x + b.w/2 + 4, b.y);
      x.fill();
      // Tile lines
      x.strokeStyle = 'rgba(0,0,0,0.2)';
      x.lineWidth = 1;
      for (let i = -b.w/2; i < b.w/2; i += 8) {
        x.beginPath();
        x.moveTo(b.x + i, b.y);
        x.lineTo(b.x + i + 4, b.y - 15);
        x.stroke();
      }
    } else {
      x.fillRect(b.x - b.w/2, b.y - 4, b.w, 4);
    }
    
    // Windows
    x.fillStyle = 'rgba(255,255,255,0.25)';
    x.fillRect(b.x - b.w/2 + 6, b.y + 12, 8, 12);
    x.fillRect(b.x + b.w/2 - 14, b.y + 12, 8, 12);
    x.fillRect(b.x - b.w/2 + 6, b.y + 32, 8, 12);
    x.fillRect(b.x + b.w/2 - 14, b.y + 32, 8, 12);
    
    // Door
    x.fillStyle = '#5a4030';
    x.fillRect(b.x - 6, b.y + b.h - 18, 12, 16);
    
    // Shop awning
    if (b.type === 'shop') {
      x.fillStyle = '#c45c3e';
      x.fillRect(b.x - b.w/2 - 2, b.y + 8, b.w + 4, 10);
      x.fillStyle = '#fff';
      for (let i = 0; i < b.w; i += 10) {
        x.beginPath();
        x.moveTo(b.x - b.w/2 + i, b.y + 8);
        x.lineTo(b.x - b.w/2 + i + 5, b.y + 18);
        x.lineTo(b.x - b.w/2 + i + 10, b.y + 8);
        x.fill();
      }
    }
  });
  
  // Street items
  World.streetItems.forEach(s => {
    if (s.type === 'stall') {
      // Market stall
      x.fillStyle = '#8b6f47';
      x.fillRect(s.x - 15, s.y - 5, 30, 3);
      x.fillRect(s.x - 12, s.y, 3, 15);
      x.fillRect(s.x + 9, s.y, 3, 15);
      // Awning
      x.fillStyle = '#e74c3c';
      x.beginPath();
      x.moveTo(s.x - 18, s.y - 5);
      x.lineTo(s.x, s.y - 20);
      x.lineTo(s.x + 18, s.y - 5);
      x.fill();
    } else if (s.type === 'barrel') {
      x.fillStyle = '#8b6914';
      x.beginPath();
      x.ellipse(s.x, s.y, 10, 8, 0, 0, Math.PI * 2);
      x.fill();
      x.fillRect(s.x - 10, s.y - 8, 20, 16);
      x.fillStyle = '#6b4d0e';
      x.beginPath();
      x.ellipse(s.x, s.y - 8, 10, 3, 0, 0, Math.PI * 2);
      x.fill();
    } else {
      // Crate
      x.fillStyle = '#8b6914';
      x.fillRect(s.x - 8, s.y - 8, 16, 16);
      x.strokeStyle = '#5a4a0e';
      x.lineWidth = 1;
      x.strokeRect(s.x - 8, s.y - 8, 16, 16);
      x.strokeRect(s.x - 2, s.y - 8, 4, 16);
      x.strokeRect(s.x - 8, s.y - 2, 16, 4);
    }
  });
  
  // Pickups (dreams/coins)
  World.pickups.forEach(p => {
    if (p.y < S.camY - H || p.y > S.camY + H) return;
    const pulse = 1 + Math.sin(Date.now() * 0.005 + p.pulse) * 0.2;
    const r = 10 * pulse;
    
    // Glow
    const g = x.createRadialGradient(p.x, p.y, 0, p.x, p.y, r * 2);
    g.addColorStop(0, 'rgba(252, 217, 122, 0.6)');
    g.addColorStop(1, 'rgba(252, 217, 122, 0)');
    x.fillStyle = g;
    x.beginPath();
    x.arc(p.x, p.y, r * 2, 0, Math.PI * 2);
    x.fill();
    
    // Coin
    x.fillStyle = '#fcd97a';
    x.beginPath();
    x.ellipse(p.x, p.y, r, r * 1.1, 0, 0, Math.PI * 2);
    x.fill();
    x.strokeStyle = '#e5b94a';
    x.lineWidth = 2;
    x.stroke();
    
    // Shine
    x.fillStyle = '#fff';
    x.beginPath();
    x.ellipse(p.x + 3, p.y - 3, r * 0.3, r * 0.25, 0, 0, Math.PI * 2);
    x.fill();
  });
  
  // Player (milkmaid)
  const px = 0;
  const py = S.y;
  
  // Shadow
  x.fillStyle = 'rgba(0,0,0,0.2)';
  x.beginPath();
  x.ellipse(px, py + 20, 20, 7, 0, 0, Math.PI * 2);
  x.fill();
  
  // Apply balance tilt to player
  x.save();
  x.translate(px, py);
  x.rotate(S.balance * 0.18);
  
  // Dress/body (tilts with balance)
  x.fillStyle = '#2a5a3a';
  x.beginPath();
  x.moveTo(0, -5);
  x.lineTo(-16, 22);
  x.lineTo(16, 22);
  x.fill();
  
  // Torso
  x.fillStyle = '#4a3a2a';
  x.fillRect(-7, -25, 14, 22);
  
  // Arms balancing
  x.strokeStyle = '#f5d4a8';
  x.lineWidth = 4;
  x.lineCap = 'round';
  // Left arm
  x.beginPath();
  x.moveTo(-7, -20);
  x.lineTo(-18 - S.balance * 10, -15);
  x.stroke();
  // Right arm
  x.beginPath();
  x.moveTo(7, -20);
  x.lineTo(18 - S.balance * 10, -15);
  x.stroke();
  
  // Head
  x.fillStyle = '#f5d4a8';
  x.beginPath();
  x.arc(0, -32, 9, 0, Math.PI * 2);
  x.fill();
  
  // Hair
  x.fillStyle = '#3a2a1a';
  x.beginPath();
  x.arc(0, -36, 10, Math.PI, 0);
  x.fill();
  x.fillRect(-10, -36, 20, 10);
  x.beginPath();
  x.ellipse(-12, -28, 4, 8, 0.3, 0, Math.PI * 2);
  x.fill();
  x.beginPath();
  x.ellipse(12, -28, 4, 8, -0.3, 0, Math.PI * 2);
  x.fill();
  
  // Eyes (looking worried when unbalanced)
  x.fillStyle = '#2a1f15';
  const eyeOffset = S.balance * 2;
  x.beginPath();
  x.arc(-3 + eyeOffset, -32, 1.5, 0, Math.PI * 2);
  x.arc(3 + eyeOffset, -32, 1.5, 0, Math.PI * 2);
  x.fill();
  
  // Milk jug on head (separate rotation for wobble effect)
  x.save();
  x.translate(0, -42);
  x.rotate(S.balance * 0.4 + Math.sin(Date.now() * 0.01) * 0.05);
  
  // Jug body
  x.fillStyle = '#7a8a9a';
  x.beginPath();
  x.moveTo(-8, 0);
  x.lineTo(-6, -18);
  x.lineTo(6, -18);
  x.lineTo(8, 0);
  x.fill();
  
  // Jug rim
  x.fillStyle = '#9aaaba';
  x.beginPath();
  x.ellipse(0, -18, 7, 2, 0, 0, Math.PI * 2);
  x.fill();
  
  // Milk inside
  x.fillStyle = '#fff';
  x.beginPath();
  x.ellipse(0, -16, 5, 1.5, 0, 0, Math.PI * 2);
  x.fill();
  
  // Spilling milk indicator (when unbalanced)
  if (Math.abs(S.balance) > 0.6) {
    const spillDir = S.balance > 0 ? 1 : -1;
    x.fillStyle = 'rgba(255,255,255,0.8)';
    x.beginPath();
    x.moveTo(spillDir * 6, -15);
    x.lineTo(spillDir * 12, -8);
    x.lineTo(spillDir * 8, -5);
    x.fill();
  }
  
  x.restore();
  x.restore();
  
  // Particles
  World.particles.forEach(p => {
    const a = p.life / 0.6;
    x.globalAlpha = a;
    x.fillStyle = p.color;
    x.beginPath();
    x.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    x.fill();
  });
  x.globalAlpha = 1;
  
  x.restore();
  
  // UI updates
  document.getElementById('score').textContent = S.score;
  document.getElementById('dist').textContent = Math.floor(S.distance);
  document.getElementById('bal').style.transform = `translateX(-50%) translateX(${S.balance * 60}px)`;
}

// Main loop
let last = 0;
function loop(t) {
  const dt = Math.min((t - last) / 1000, 0.05);
  last = t;
  
  update(dt);
  draw();
  
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
